<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moody Music</title>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --glass-bg:rgba(255,255,255,0.18); --glass-border:rgba(255,255,255,0.35); --blur:28px; --tp:rgba(255,255,255,0.95); --ts:rgba(255,255,255,0.65); --tt:rgba(255,255,255,0.4); }
html,body { height:100%; font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif; overflow-x:hidden; }
body { min-height:100vh; background:#0a0a1a; color:var(--tp); transition:background 1.2s ease; }
.bg-mesh { position:fixed; inset:0; z-index:0; overflow:hidden; }
.orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.55; animation:drift 8s ease-in-out infinite alternate; }
.orb-1 { width:600px; height:600px; top:-10%; left:-10%; background:radial-gradient(circle,#3b82f6,#1d4ed8); }
.orb-2 { width:500px; height:500px; top:30%; right:-5%; background:radial-gradient(circle,#8b5cf6,#6d28d9); animation-delay:-2s; }
.orb-3 { width:400px; height:400px; bottom:-10%; left:20%; background:radial-gradient(circle,#06b6d4,#0284c7); animation-delay:-4s; }
@keyframes drift { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(30px,20px) scale(1.08)} }
body.happy .orb-1{background:radial-gradient(circle,#fbbf24,#f59e0b)} body.happy .orb-2{background:radial-gradient(circle,#fb923c,#ea580c)} body.happy .orb-3{background:radial-gradient(circle,#facc15,#eab308)}
body.sad .orb-1{background:radial-gradient(circle,#60a5fa,#2563eb)} body.sad .orb-2{background:radial-gradient(circle,#818cf8,#4338ca)} body.sad .orb-3{background:radial-gradient(circle,#93c5fd,#1d4ed8)}
body.angry .orb-1{background:radial-gradient(circle,#f87171,#dc2626)} body.angry .orb-2{background:radial-gradient(circle,#fb923c,#c2410c)} body.angry .orb-3{background:radial-gradient(circle,#fca5a5,#b91c1c)}
body.fearful .orb-1{background:radial-gradient(circle,#a78bfa,#5b21b6)} body.fearful .orb-2{background:radial-gradient(circle,#6d28d9,#4c1d95)} body.fearful .orb-3{background:radial-gradient(circle,#7c3aed,#3730a3)}
body.disgusted .orb-1{background:radial-gradient(circle,#4ade80,#16a34a)} body.disgusted .orb-2{background:radial-gradient(circle,#86efac,#15803d)} body.disgusted .orb-3{background:radial-gradient(circle,#22c55e,#166534)}
body.surprised .orb-1{background:radial-gradient(circle,#34d399,#059669)} body.surprised .orb-2{background:radial-gradient(circle,#a3e635,#65a30d)} body.surprised .orb-3{background:radial-gradient(circle,#fbbf24,#d97706)}
body.neutral .orb-1{background:radial-gradient(circle,#94a3b8,#475569)} body.neutral .orb-2{background:radial-gradient(circle,#cbd5e1,#334155)} body.neutral .orb-3{background:radial-gradient(circle,#64748b,#1e293b)}
.glass { background:var(--glass-bg); backdrop-filter:blur(var(--blur)) saturate(1.8); -webkit-backdrop-filter:blur(var(--blur)) saturate(1.8); border:1px solid var(--glass-border); border-radius:24px; box-shadow:0 8px 32px rgba(0,0,0,0.12),inset 0 1px 0 rgba(255,255,255,0.2); }
.app { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:48px 24px 80px; }
header { text-align:center; margin-bottom:40px; }
.logo { width:72px; height:72px; margin:0 auto 20px; border-radius:22px; background:rgba(255,255,255,0.15); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.3); display:flex; align-items:center; justify-content:center; font-size:36px; }
h1 { font-size:clamp(2.4rem,5vw,3.4rem); font-weight:600; letter-spacing:-0.03em; background:linear-gradient(135deg,rgba(255,255,255,1),rgba(255,255,255,0.7)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.tagline { margin-top:10px; font-size:1.05rem; color:var(--ts); font-weight:300; }
.modes { display:flex; gap:8px; margin-bottom:36px; padding:5px; border-radius:14px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); }
.mBtn { padding:8px 22px; border-radius:10px; border:none; font-size:14px; font-weight:500; cursor:pointer; transition:all .25s; font-family:inherit; color:var(--ts); background:transparent; }
.mBtn.active { background:rgba(255,255,255,0.18); color:var(--tp); border:1px solid rgba(255,255,255,0.25); }
.card { width:100%; max-width:520px; padding:36px; margin-bottom:24px; }
.lbl { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tt); margin-bottom:14px; }
.egrid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:28px; }
.epill { padding:10px 6px; border-radius:12px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.07); color:var(--ts); font-size:13px; font-weight:500; cursor:pointer; transition:all .2s; text-align:center; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:5px; }
.epill:hover { background:rgba(255,255,255,0.14); color:var(--tp); transform:translateY(-1px); }
.epill.sel { background:rgba(255,255,255,0.2); color:var(--tp); border-color:rgba(255,255,255,0.4); }
.eico { font-size:20px; }
.btn { width:100%; padding:15px; border-radius:14px; border:none; background:rgba(255,255,255,0.9); color:#0a0a1a; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; transition:all .2s; box-shadow:0 4px 20px rgba(0,0,0,0.25); }
.btn:hover { background:white; transform:translateY(-1px); }
.btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
.camwrap { position:relative; width:100%; aspect-ratio:4/3; border-radius:16px; overflow:hidden; background:rgba(0,0,0,0.4); margin-bottom:14px; border:1px solid rgba(255,255,255,0.12); }
#vid { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:none; }
#fc { position:absolute; top:0; left:0; width:100%; height:100%; transform:scaleX(-1); pointer-events:none; }
.camph { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
.camph-ico { font-size:40px; }
.camph-txt { font-size:13px; color:var(--tt); text-align:center; line-height:1.6; }
.badge { position:absolute; top:10px; right:10px; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:500; background:rgba(0,0,0,0.5); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.15); display:none; align-items:center; gap:6px; }
.dot { width:7px; height:7px; border-radius:50%; background:#ef4444; }
.dot.on { background:#22c55e; animation:blink 2s infinite; }
.dot.scan { background:#f59e0b; animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.loadbar { width:100%; height:3px; border-radius:2px; background:rgba(255,255,255,0.1); margin-bottom:14px; overflow:hidden; display:none; }
.loadbar-inner { height:100%; background:rgba(255,255,255,0.6); border-radius:2px; animation:ld 1.5s ease-in-out infinite; width:40%; }
@keyframes ld { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }
.elive { text-align:center; font-size:13px; color:var(--ts); min-height:22px; margin-bottom:14px; }
.rcard { width:100%; max-width:520px; padding:28px 32px; display:none; }
.rcard.vis { display:block; animation:sup .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes sup { from{opacity:0;transform:translateY(20px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
.rlbl { font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--tt); margin-bottom:6px; }
.rname { font-size:2rem; font-weight:600; letter-spacing:-.02em; margin-bottom:20px; display:flex; align-items:center; gap:12px; }
.div { height:1px; background:rgba(255,255,255,0.12); margin-bottom:20px; }
.slbl { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tt); margin-bottom:8px; }
.stitle { font-size:1.2rem; font-weight:500; letter-spacing:-.01em; line-height:1.35; margin-bottom:4px; }
.sartist { font-size:14px; color:var(--ts); }
.shuf { margin-top:20px; padding:10px 20px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); color:var(--ts); font-size:13px; font-weight:500; font-family:inherit; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:7px; }
.shuf:hover { background:rgba(255,255,255,0.14); color:var(--tp); }
.panel { display:none; } .panel.on { display:block; }
footer { margin-top:auto; padding-top:48px; font-size:12px; color:var(--tt); text-align:center; }
</style>
</head>
<body>
<div class="bg-mesh"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div class="app">
  <header>
    <div class="logo">🎵</div>
    <h1>Moody Music</h1>
    <p class="tagline">Your emotion. Your soundtrack.</p>
  </header>
  <div class="modes">
    <button class="mBtn active" onclick="sw('demo')">Demo</button>
    <button class="mBtn" onclick="sw('live')">Live Camera</button>
  </div>

  <div id="pdemo" class="panel on">
    <div class="card glass">
      <p class="lbl">How are you feeling?</p>
      <div class="egrid">
        <button class="epill" onclick="sel('happy')" data-e="happy"><span class="eico">😊</span><span>Happy</span></button>
        <button class="epill" onclick="sel('sad')" data-e="sad"><span class="eico">😢</span><span>Sad</span></button>
        <button class="epill" onclick="sel('angry')" data-e="angry"><span class="eico">😠</span><span>Angry</span></button>
        <button class="epill" onclick="sel('fearful')" data-e="fearful"><span class="eico">😨</span><span>Fear</span></button>
        <button class="epill" onclick="sel('disgusted')" data-e="disgusted"><span class="eico">🤢</span><span>Disgust</span></button>
        <button class="epill" onclick="sel('surprised')" data-e="surprised"><span class="eico">😲</span><span>Surprise</span></button>
        <button class="epill" onclick="sel('neutral')" data-e="neutral"><span class="eico">😐</span><span>Neutral</span></button>
      </div>
      <button class="btn" id="dBtn" onclick="rec()" disabled>Get My Song</button>
    </div>
  </div>

  <div id="plive" class="panel">
    <div class="card glass">
      <p class="lbl">Face Detection — No Server Needed</p>
      <div class="loadbar" id="lb"><div class="loadbar-inner"></div></div>
      <div class="camwrap">
        <video id="vid" autoplay playsinline muted></video>
        <canvas id="fc"></canvas>
        <div class="camph" id="cph"><div class="camph-ico">📷</div><p class="camph-txt">Runs entirely in your browser<br>No server required</p></div>
        <div class="badge" id="bdg"><div class="dot" id="bdot"></div><span id="btxt">Live</span></div>
      </div>
      <div class="elive" id="elive"></div>
      <button class="btn" id="lBtn" onclick="tog()">Start Analysis</button>
    </div>
  </div>

  <div id="rc" class="rcard glass">
    <p class="rlbl">Detected emotion</p>
    <div class="rname"><span id="rico">😊</span><span id="rem">Happy</span></div>
    <div class="div"></div>
    <p class="slbl">🎵 Now playing</p>
    <p class="stitle" id="rst">Here Comes The Sun</p>
    <p class="sartist" id="rar">The Beatles</p>
    <button class="shuf" onclick="shuf()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>Shuffle another</button>
  </div>
  <footer>Moody Music &nbsp;·&nbsp; face-api.js &nbsp;·&nbsp; High School Hackathon 2026</footer>
</div>
<script>
const songs={happy:[["Mr. Blue Sky","ELO"],["Don't Stop Me Now","Queen"],["Walking on Sunshine","Katrina & The Waves"],["Happy","Pharrell Williams"],["Good Vibrations","The Beach Boys"],["Uptown Funk","Mark Ronson ft. Bruno Mars"],["Hey Ya!","Outkast"],["Dancing Queen","ABBA"],["September","Earth Wind & Fire"],["Here Comes The Sun","The Beatles"],["Can't Stop the Feeling!","Justin Timberlake"],["I Wanna Dance with Somebody","Whitney Houston"]],sad:[["Hurt","Johnny Cash"],["Someone Like You","Adele"],["Nothing Compares 2 U","Sinéad O'Connor"],["Tears in Heaven","Eric Clapton"],["Fix You","Coldplay"],["Fast Car","Tracy Chapman"],["The Night We Met","Lord Huron"],["Between the Bars","Elliott Smith"],["Liability","Lorde"],["Hallelujah","Jeff Buckley"],["Creep","Radiohead"],["Eleanor Rigby","The Beatles"]],angry:[["You Oughta Know","Alanis Morissette"],["Killing in the Name","Rage Against the Machine"],["March of the Pigs","Nine Inch Nails"],["Bulls on Parade","Rage Against the Machine"],["Given Up","Linkin Park"],["Bad Reputation","Joan Jett"],["Walk","Pantera"],["The Pretender","Foo Fighters"],["American Idiot","Green Day"],["Break Stuff","Limp Bizkit"],["B.Y.O.B.","System of a Down"]],fearful:[["Lullaby","The Cure"],["Climbing Up the Walls","Radiohead"],["Bela Lugosi's Dead","Bauhaus"],["Black Sabbath","Black Sabbath"],["Red Right Hand","Nick Cave & The Bad Seeds"],["Come to Daddy","Aphex Twin"],["Karmacoma","Massive Attack"],["The Becoming","Nine Inch Nails"],["A Forest","The Cure"],["Roads","Portishead"]],disgusted:[["The Beautiful People","Marilyn Manson"],["Closer","Nine Inch Nails"],["Guillotine","Death Grips"],["Dirt","Alice in Chains"],["Stinkfist","Tool"],["Heart-Shaped Box","Nirvana"],["Vampire","Olivia Rodrigo"],["Bad Guy","Billie Eilish"],["Rats","Ghost"],["Leech","Slipknot"]],surprised:[["In the Air Tonight","Phil Collins"],["Bohemian Rhapsody","Queen"],["Paranoid Android","Radiohead"],["Bangarang","Skrillex"],["Chop Suey!","System of a Down"],["A Day in the Life","The Beatles"],["Knights of Cydonia","Muse"],["Smells Like Teen Spirit","Nirvana"],["Toxicity","System of a Down"],["The Chain","Fleetwood Mac"]],neutral:[["Weightless","Marconi Union"],["1/1","Brian Eno"],["Avril 14th","Aphex Twin"],["Daydreaming","Radiohead"],["Gymnopédie No.1","Erik Satie"],["Treefingers","Radiohead"],["Watermark","Enya"],["A Warm Place","Nine Inch Nails"],["Roygbiv","Boards of Canada"],["Dictaphone's Lament","Tycho"]]};
const icons={happy:'😊',sad:'😢',angry:'😠',fearful:'😨',disgusted:'🤢',surprised:'😲',neutral:'😐'};
let mode='demo',selE=null,curE=null,running=false,stream=null,loop=null,loaded=false,lastE=null,eCount=0;

function sw(m){
  mode=m;
  document.querySelectorAll('.mBtn').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='demo')||(i===1&&m==='live')));
  document.getElementById('pdemo').classList.toggle('on',m==='demo');
  document.getElementById('plive').classList.toggle('on',m==='live');
  document.getElementById('rc').classList.remove('vis');
  if(m!=='live'&&running)stop();
}
function sel(e){selE=e;document.querySelectorAll('.epill').forEach(p=>p.classList.toggle('sel',p.dataset.e===e));document.getElementById('dBtn').disabled=false;document.body.className=e;}
function rec(){if(selE)show(selE);}
function show(e){
  curE=e;document.body.className=e;
  const list=songs[e]||songs.neutral;
  const p=list[Math.floor(Math.random()*list.length)];
  document.getElementById('rico').textContent=icons[e]||'🎵';
  document.getElementById('rem').textContent=e.charAt(0).toUpperCase()+e.slice(1);
  document.getElementById('rst').textContent=p[0];
  document.getElementById('rar').textContent=p[1];
  const c=document.getElementById('rc');c.classList.remove('vis');void c.offsetWidth;c.classList.add('vis');
}
function shuf(){if(!curE)return;const list=songs[curE]||songs.neutral;const p=list[Math.floor(Math.random()*list.length)];document.getElementById('rst').textContent=p[0];document.getElementById('rar').textContent=p[1];}

const MODEL='https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
async function loadM(){
  document.getElementById('lb').style.display='block';
  document.getElementById('lBtn').disabled=true;
  document.getElementById('lBtn').textContent='Loading models…';
  try{
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL);
    await faceapi.nets.faceExpressionNet.loadFromUri(MODEL);
    loaded=true;
  }catch(e){loaded=true;}
  document.getElementById('lb').style.display='none';
  document.getElementById('lBtn').disabled=false;
  document.getElementById('lBtn').textContent='Start Analysis';
}
async function tog(){if(running){stop();return;}if(!loaded)await loadM();await start();}
async function start(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});
    const v=document.getElementById('vid');v.srcObject=stream;v.style.display='block';
    document.getElementById('cph').style.display='none';
    const b=document.getElementById('bdg');b.style.display='flex';
    document.getElementById('bdot').className='dot on';document.getElementById('btxt').textContent='Live';
    document.getElementById('lBtn').textContent='Stop Analysis';
    running=true;
    v.addEventListener('loadeddata',detect,{once:true});
  }catch(e){document.getElementById('elive').textContent='Camera access denied — please allow camera';}
}
async function detect(){
  const v=document.getElementById('vid');
  const c=document.getElementById('fc');
  c.width=v.videoWidth;c.height=v.videoHeight;
  async function tick(){
    if(!running)return;
    const r=await faceapi.detectSingleFace(v,new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
    const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);
    if(r){
      const{x,y,width,height}=r.detection.box;
      ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=2;ctx.strokeRect(x,y,width,height);
      const expr=r.expressions;
      const sorted=Object.entries(expr).sort((a,b)=>b[1]-a[1]);
      const dom=sorted[0][0];const conf=(sorted[0][1]*100).toFixed(0);
      document.getElementById('elive').textContent=icons[dom]+' '+dom+' — '+conf+'% confidence';
      document.getElementById('bdot').className='dot on';document.getElementById('btxt').textContent='Live';
      if(dom===lastE){eCount++;if(eCount===2)show(dom);}else{lastE=dom;eCount=0;}
    }else{document.getElementById('elive').textContent='No face detected — move closer';}
    loop=setTimeout(tick,350);
  }
  tick();
}
function stop(){
  running=false;clearTimeout(loop);
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  const v=document.getElementById('vid');v.srcObject=null;v.style.display='none';
  document.getElementById('cph').style.display='flex';
  document.getElementById('bdg').style.display='none';
  document.getElementById('elive').textContent='';
  document.getElementById('lBtn').textContent='Start Analysis';
  lastE=null;eCount=0;
}
</script>
</body>
</html>
